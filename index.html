<!doctype html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#172b24" />
    <meta
      name="description"
      content="Een rustig, offline overzicht van je geld, vaste lasten en spaardoelen."
    />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon.png" />
    <link rel="stylesheet" href="./styles.css" />
    <title>Mijn Geld</title>
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" aria-label="Hoofdnavigatie">
        <div class="brand">
          <div class="brand-mark" aria-hidden="true">€</div>
          <div>
            <p class="brand-name">Mijn Geld</p>
            <p class="brand-subtitle">Rustig overzicht</p>
          </div>
        </div>

        <nav class="main-nav">
          <button class="nav-item is-active" type="button" data-view="dashboard">
            <span class="nav-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" focusable="false">
                <rect x="3" y="3" width="7" height="9" rx="1.5"></rect>
                <rect x="14" y="3" width="7" height="5" rx="1.5"></rect>
                <rect x="14" y="12" width="7" height="9" rx="1.5"></rect>
                <rect x="3" y="16" width="7" height="5" rx="1.5"></rect>
              </svg>
            </span>
            <span class="nav-label">Overzicht</span>
          </button>
          <button class="nav-item" type="button" data-view="planning">
            <span class="nav-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" focusable="false">
                <rect x="3" y="5" width="18" height="16" rx="2"></rect>
                <path d="M16 3v4M8 3v4M3 10h18M8 14h.01M12 14h.01M16 14h.01M8 18h.01M12 18h.01"></path>
              </svg>
            </span>
            <span class="nav-label">Planning</span>
          </button>
          <button class="nav-item" type="button" data-view="jars">
            <span class="nav-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" focusable="false">
                <path d="M6 7h12a3 3 0 0 1 3 3v8a3 3 0 0 1-3 3H6a3 3 0 0 1-3-3V7.8A2.8 2.8 0 0 1 5.8 5H18"></path>
                <path d="M16 12h5v5h-5a2.5 2.5 0 0 1 0-5Z"></path>
                <path d="M16.5 14.5h.01"></path>
              </svg>
            </span>
            <span class="nav-label">Spaarpotjes</span>
          </button>
          <button class="nav-item" type="button" data-view="settings">
            <span class="nav-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" focusable="false">
                <path d="M4 7h10M18 7h2M4 17h2M10 17h10M14 4v6M6 14v6"></path>
                <circle cx="14" cy="7" r="2"></circle>
                <circle cx="6" cy="17" r="2"></circle>
              </svg>
            </span>
            <span class="nav-label">Instellingen</span>
          </button>
        </nav>

        <div class="sidebar-footer">
          <button class="start-button" type="button" data-action="open-balance-modal">
            <svg class="button-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
              <path d="M12 5v14M5 12h14"></path>
            </svg>
            <span>Saldi invullen</span>
          </button>
          <p>Alles blijft alleen op dit apparaat.</p>
        </div>
      </aside>

      <main id="app" class="app-main" tabindex="-1"></main>
    </div>

    <div id="modal-root" class="modal-root"></div>
    <div id="toast" class="toast" role="status" aria-live="polite"></div>
    <aside
      id="update-prompt"
      class="update-prompt is-hidden"
      role="status"
      aria-live="polite"
      aria-atomic="true"
      aria-labelledby="update-prompt-title"
      aria-describedby="update-prompt-description"
    >
      <div class="update-prompt__copy">
        <strong id="update-prompt-title">Nieuwe versie klaar</strong>
        <p id="update-prompt-description">Je gegevens blijven op dit apparaat staan. Werk Mijn Geld bij wanneer het uitkomt.</p>
      </div>
      <div class="update-prompt__actions">
        <button id="update-later" class="button button-secondary button-small" type="button">Later</button>
        <button id="update-now" class="button button-primary button-small" type="button">Bijwerken</button>
      </div>
    </aside>

    <script src="./app.js" defer></script>
  </body>
</html>
